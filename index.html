<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,600;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

        /* base styles (same as before, plus footer enhancements) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0b; color: #f0f0f0; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        header { position: sticky; top: 0; z-index: 100; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #f97316; }
        .navbar { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; color: white; }
        .logo span { color: #f97316; }
        .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: 0.2s; border-bottom: 2px solid transparent; padding-bottom: 4px; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { color: #f97316; border-bottom-color: #f97316; }
        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; background: #1a1a1a; border: 1px solid #f97316; border-radius: 12px; padding: 0.75rem 0; min-width: 200px; display: none; flex-direction: column; z-index: 200; }
        .dropdown:hover .dropdown-menu { display: flex; }
        .dropdown-menu a { padding: 0.5rem 1.5rem; border-bottom: none !important; color: #ddd; font-size: 1rem; }
        .dropdown-menu a:hover { background: #f97316; color: #0b0b0b; }
        .lang-switch { display: flex; gap: 0.5rem; margin-left: 1rem; }
        .lang-switch button { background: transparent; border: 1px solid #f97316; color: #f97316; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .lang-switch button.active { background: #f97316; color: #0b0b0b; }
        .hamburger { display: none; font-size: 2rem; color: #f97316; cursor: pointer; }
        .btn { display: inline-block; background-color: #f97316; color: #0b0b0b; font-weight: 700; padding: 0.9rem 2.5rem; border-radius: 40px; text-decoration: none; font-size: 1.2rem; border: none; transition: 0.25s; box-shadow: 0 8px 20px rgba(249,115,22,0.3); cursor: pointer; }
        .btn:hover { background-color: #ff8c3a; transform: scale(1.02); }
        .btn-small { padding: 0.5rem 1.5rem; font-size: 1rem; }
        .section-title { font-size: 3rem; font-weight: 800; margin-bottom: 2.5rem; position: relative; display: inline-block; }
        .section-title::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100px; height: 5px; background: #f97316; border-radius: 4px; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 2rem; flex: 1; }
        /* video banner */
        .video-banner { width: 100%; height: 70vh; min-height: 500px; position: relative; overflow: hidden; margin-bottom: 3rem; border-bottom: 4px solid #f97316; }
        .video-banner video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 0; }
        .video-banner .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1; text-align: center; }
        .video-banner h2 { font-size: 4rem; font-weight: 800; color: white; text-shadow: 0 4px 15px black; }
        .video-banner h2 span { color: #f97316; }
        /* hero */
        .hero { height: 90vh; min-height: 700px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat; display: flex; align-items: center; text-align: center; border-bottom: 4px solid #f97316; }
        .hero-content { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
        .hero h2 { font-size: 5rem; font-weight: 800; line-height: 1.1; letter-spacing: -2px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .hero h2 span { color: #f97316; }
        .hero-tagline { font-size: 1.8rem; font-weight: 400; color: #e0e0e0; margin: 1rem 0 0.5rem; }
        .hero-description { font-size: 1.3rem; color: #ccc; margin: 1.5rem 0 2.5rem; }
        /* services grid */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .service-card { background: #1a1a1a; border-radius: 24px; overflow: hidden; border: 1px solid #2a2a2a; transition: all 0.3s ease; }
        .service-card:hover { transform: translateY(-8px); border-color: #f97316; box-shadow: 0 20px 30px -10px #f9731640; }
        .service-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .service-card .content { padding: 1.8rem; }
        .service-card h3 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #f97316; }
        .service-card p { color: #aaa; margin-bottom: 1rem; }
        .btn-outline { background: transparent; border: 2px solid #f97316; color: #f97316; padding: 0.5rem 1rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-block; margin-right: 0.5rem; transition: 0.2s; }
        .btn-outline:hover { background: #f97316; color: #0b0b0b; }
        /* artists grid (5 per row) */
        .artists-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2rem; margin-top: 2rem; }
        .artist-card { background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 1px solid #2a2a2a; transition: transform 0.2s ease, box-shadow 0.2s; text-align: center; cursor: pointer; }
        .artist-card:hover { transform: translateY(-6px); box-shadow: 0 15px 25px -8px #f9731650; border-color: #f97316; }
        .artist-card img { width: 100%; height: 220px; object-fit: cover; }
        .artist-card h4 { font-size: 1.5rem; margin: 1rem 0 0.3rem; }
        .artist-card p { color: #aaa; margin-bottom: 1rem; }
        /* artist detail */
        .artist-detail { max-width: 1100px; margin: 2rem auto; }
        .artist-header { display: flex; gap: 3rem; flex-wrap: wrap; align-items: center; margin-bottom: 3rem; }
        .artist-header img { width: 300px; height: 300px; object-fit: cover; border-radius: 30px; border: 4px solid #f97316; }
        .artist-intro { flex: 1; }
        .artist-intro h1 { font-size: 3.5rem; color: #f97316; }
        .artist-bio { font-size: 1.2rem; color: #ccc; margin: 1rem 0; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin: 2rem 0; }
        .portfolio-item { background: #222; border-radius: 16px; overflow: hidden; aspect-ratio: 9/16; }
        .portfolio-item video, .portfolio-item img { width: 100%; height: 100%; object-fit: cover; }
        /* contact page */
        .contact-container { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; background: #161616; border-radius: 40px; padding: 3rem; border: 1px solid #2d2d2d; }
        .contact-info h3 { font-size: 2.3rem; }
        .orange { color: #f97316; }
        .contact-detail p { margin: 1.5rem 0; font-size: 1.2rem; }
        .contact-detail i { width: 40px; color: #f97316; }
        .social-links a { color: #fff; font-size: 2.2rem; margin-right: 1.5rem; transition: color 0.2s; }
        .social-links a:hover { color: #f97316; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 1rem; margin: 0.7rem 0; background: #252525; border: 1px solid #3a3a3a; border-radius: 16px; color: white; }
        .contact-form .btn { width: 100%; }
        /* ----- GLOBAL FOOTER WITH CONTACT FORM ----- */
        .global-footer {
            background: #0a0a0a;
            border-top: 3px solid #f97316;
            padding: 3rem 2rem 1rem;
            margin-top: 4rem;
        }
        .footer-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            align-items: start;
        }
        .footer-col h4 {
            font-size: 1.5rem;
            color: #f97316;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .footer-col h4::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f97316;
        }
        .footer-col p { color: #aaa; margin-bottom: 0.8rem; }
        .footer-col i { width: 30px; color: #f97316; }
        .footer-form input,
        .footer-form textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
        }
        .footer-form .btn-small {
            background: #f97316;
            color: #0b0b0b;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .footer-form .btn-small:hover {
            background: #ff8c3a;
        }
        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            margin-top: 2rem;
            border-top: 1px solid #222;
            color: #777;
        }
        /* responsive */
        @media (max-width: 1100px) { .artists-grid { grid-template-columns: repeat(3,1fr); } }
        @media (max-width: 800px) {
            .artists-grid { grid-template-columns: repeat(2,1fr); }
            .contact-container { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .artists-grid { grid-template-columns: 1fr; }
            .navbar { flex-direction: column; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>
<body>

            langHi.addEventListener('click', () => {
                currentLang = 'hi';
                langHi.classList.add('active');
                langEn.classList.remove('active');
                router();
            });

            // ---------- ROUTER ----------
            function router() {
                const hash = window.location.hash.substring(1);
                if (hash.startsWith('artist-')) {
                    const id = hash.split('-')[1];
                    loadPage('artist', id);
                } else if (hash === 'artists') {
                    loadPage('artist-list');
                } else if (hash === 'services') {
                    loadPage('services');
                } else if (hash === 'about') {
                    loadPage('about');
                } else if (hash === 'contact') {
                    loadPage('contact');
                } else {
                    loadPage('home');
                }
            }

            function loadPage(page, artistId = null) {
                let html = '';
                if (page === 'home') html = homePage();
                else if (page === 'services') html = servicesPage();
                else if (page === 'about') html = aboutPage();
                else if (page === 'contact') html = contactPage();
                else if (page === 'artist-list') html = artistListPage();
                else if (page === 'artist' && artistId) {
                    const artist = artists.find(a => a.id == artistId);
                    html = artist ? artistDetailPage(artist) : '<h2>Artist not found</h2>';
                } else html = homePage();
                contentDiv.innerHTML = html;
                attachNavListeners();
                updateActiveNav(page);
            }

            // ---------- PAGE GENERATORS (using currentLang) ----------
            function homePage() {
                const d = langData[currentLang];
                return `
                    <!-- Video Banner (new) -->
                    <div class="video-banner">
                        <video autoplay muted loop playsinline>
                            <source src="https://player.vimeo.com/external/371361761.sd.mp4?s=1e9b85f2c0f2e2b7f1d1d5d5e5d5e5d&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
                        </video>
                        <div class="overlay">
                            <h2>${d.heroTitle}</h2>
                        </div>
                    </div>
                    <!-- Hero section (original) -->
                    <section class="hero" style="margin-top:0;">
                        <div class="hero-content">
                            <h2>${d.heroTitle}</h2>
                            <p class="hero-tagline">${d.heroTag}</p>
                            <p class="hero-description">${d.heroDesc}</p>
                            <a class="btn" data-page="services">${currentLang==='en'?'IGNITE YOUR PROJECT':'अपना प्रोजेक्ट शुरू करें'}</a>
                        </div>
                    </section>
                    <div style="margin-top:3rem;">
                        <h2 class="section-title">${currentLang==='en'?'featured artists':'प्रमुख कलाकार'}</h2>
                        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:1rem;">
                            ${artists.slice(0,5).map(a => `<div class="artist-card" data-page="artist" data-artist-id="${a.id}"><img src="${a.image}" alt="${a.name}"><h4>${a.name}</h4><p>${a.type}</p></div>`).join('')}
                        </div>
                    </div>
                `;
            }

            function servicesPage() {
                return `
                    <h2 class="section-title">${langData[currentLang].servicesTitle}</h2>
                    <div class="services-grid">
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?w=600" alt="Ad"><div class="content"><h3>Advertisement</h3><p>High-impact TV, digital & social ads.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1579165466742-7b7e894c29c7?w=600" alt="MV"><div class="content"><h3>Music Videos</h3><p>Visually stunning narratives.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=600" alt="Prod"><div class="content"><h3>Music Production</h3><p>Recording, mixing & mastering.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?w=600" alt="Lyrics"><div class="content"><h3>Lyrics Writing</h3><p>Top-liners, ghostwriting.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=600" alt="Edit"><div class="content"><h3>Video Editing</h3><p>Seamless cuts, VFX, color.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=600" alt="Events"><div class="content"><h3>Event Management</h3><p>Full-scale production & logistics.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=600" alt="Script"><div class="content"><h3>Script Writing</h3><p>Compelling scripts for films & ads.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=600" alt="Direction"><div class="content"><h3>Direction</h3><p>Expert direction for video projects.</p></div></div>
                        <div class="service-card"><img src="https://images.unsplash.com/photo-1511795409834-432e31197aac?w=600" alt="Artist Management"><div class="content"><h3>Artist Management</h3><p>Full artist development, bookings, and career strategy.</p>
                            <a class="btn-outline btn-small" data-page="artist-list">${currentLang==='en'?'Our Artists':'हमारे कलाकार'}</a>
                            <a class="btn-outline btn-small" data-page="contact">${currentLang==='en'?'Contact & Book':'संपर्क और बुकिंग'}</a>
                        </div></div>
                    </div>
                `;
            }

            function aboutPage() {
                return `
                    <div class="about-grid">
                        <div class="about-text">
                            <h2 class="section-title">${langData[currentLang].aboutTitle}</h2>
                            <p><strong>H8 Media House</strong> ${currentLang==='en'?'is a collective of filmmakers, writers, producers, and event architects. We don’t just execute — we provoke.':'फिल्म निर्माताओं, लेखकों, निर्माताओं और इवेंट आर्किटेक्ट्स का एक समूह है। हम सिर्फ निष्पादित नहीं करते — हम उकसाते हैं।'}</p>
                            <p>${currentLang==='en'?'We put <strong>story writing</strong> at the heart of everything.':'हम <strong>कहानी लेखन</strong> को हर चीज के केंद्र में रखते हैं।'}</p>
                            <div style="margin:2rem 0;">${['✍️ Story writing','🎥 Screenwriting','🎬 Creative direction','🎚️ Audio engineering','📝 Lyrics','📖 Script doctoring','🎡 Event storytelling','🔥 Brand narrative','📽️ Direction'].map(s => `<span class="skill-badge">${s}</span>`).join('')}</div>
                            <p>${currentLang==='en'?'Based in Delhi NCR with a global mindset.':'दिल्ली एनसीआर में स्थित, वैश्विक सोच के साथ।'}</p>
                        </div>
                        <div class="about-image"><img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=600" alt="Team"></div>
                    </div>
                `;
            }

            function contactPage() {
                return `
                    <h2 class="section-title">${langData[currentLang].contactTitle}</h2>
                    <div class="contact-container">
                        <div class="contact-info">
                            <h3>h8<span class="orange">.studio</span></h3>
                            <p>${currentLang==='en'?'We’re ready when you are. Hit us up.':'हम आपके लिए तैयार हैं। संपर्क करें।'}</p>
                            <div class="contact-detail"><p><i class="fas fa-map-marker-alt"></i> Delhi NCR, India</p><p><i class="fas fa-phone-alt"></i> +91 7870455069</p><p><i class="fas fa-envelope"></i> gyanendra0710@gmail.com</p></div>
                            <div class="social-links"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-x-twitter"></i></a><a href="#"><i class="fab fa-soundcloud"></i></a><a href="#"><i class="fab fa-youtube"></i></a></div>
                        </div>
                        <div class="contact-form">
                            <form action="https://formsubmit.co/gyanendra0710@gmail.com" method="POST">
                                <input type="text" name="name" placeholder="${currentLang==='en'?'your name':'आपका नाम'}" required>
                                <input type="email" name="email" placeholder="email" required>
                                <textarea name="message" placeholder="${currentLang==='en'?'tell us about your vision...':'अपना विजन बताएं...'}" required></textarea>
                                <button type="submit" class="btn">${currentLang==='en'?'send spark':'संदेश भेजें'}</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            function artistListPage() {
                return `
                    <h2 class="section-title">${currentLang==='en'?'our artists':'हमारे कलाकार'}</h2>
                    <div class="artists-grid">
                        ${artists.map(a => `
                            <div class="artist-card" data-page="artist" data-artist-id="${a.id}">
                                <img src="${a.image}" alt="${a.name}">
                                <h4>${a.name}</h4>
                                <p>${a.type}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            function artistDetailPage(artist) {
                return `
                    <div class="artist-detail">
                        <div class="artist-header">
                            <img src="${artist.image}" alt="${artist.name}">
                            <div class="artist-intro">
                                <h1>${artist.name}</h1>
                                <p class="artist-bio">${artist.bio}</p>
                                <a class="btn" data-page="contact">${currentLang==='en'?'Get a Quote':'कोटा प्राप्त करें'}</a>
                            </div>
                        </div>
                        <h3 style="color:#f97316; margin:2rem 0 1rem;">${currentLang==='en'?'Performance Videos':'प्रदर्शन वीडियो'}</h3>
                        <div class="portfolio-grid">
                            <div class="portfolio-item"><video src="${artist.portraitVideo}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video></div>
                            ${artist.portfolioImages.map(url => `<div class="portfolio-item"><img src="${url}" alt="portfolio"></div>`).join('')}
                        </div>
                        <div style="text-align:center; margin:3rem 0;">
                            <a class="btn btn-small" data-page="contact">${currentLang==='en'?'Book '+artist.name:artist.name+' को बुक करें'}</a>
                        </div>
                    </div>
                `;
            }

            function attachNavListeners() {
                document.querySelectorAll('[data-page]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = el.getAttribute('data-page');
                        if (page === 'artist') {
                            const id = el.getAttribute('data-artist-id');
                            window.location.hash = id ? `artist-${id}` : 'artists';
                        } else if (page === 'artist-list') {
                            window.location.hash = 'artists';
                        } else {
                            window.location.hash = page;
                        }
                    });
                });
                document.querySelectorAll('[data-artist-id]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        const id = el.getAttribute('data-artist-id');
                        window.location.hash = `artist-${id}`;
                    });
                });
            }

            function updateActiveNav(page) {
                document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
                if (page !== 'artist-list' && page !== 'artist') {
                    const activeLink = document.querySelector(`.nav-links a[data-page="${page}"]`);
                    if (activeLink) activeLink.classList.add('active');
                }
            }

            // mobile hamburger
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('navLinks');
            hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));

            window.addEventListener('hashchange', router);
            window.addEventListener('load', router);
        })();
    </script>
</body>
</html>
