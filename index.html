<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H8 Media House · starry theme</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,600;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- animated starry background -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <!-- custom cursor -->
    <div class="custom-cursor" id="cursor"></div>

    <header>
        <nav class="navbar">
            <div class="logo">H8<span> Media House</span></div>
            <ul class="nav-links" id="navLinks">
                <li><a data-page="home">HOME</a></li>
                <li><a data-page="services">SERVICES</a></li>
                <li class="dropdown">
                    <a>ARTISTS <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i></a>
                    <div class="dropdown-menu" id="artistDropdown"></div>
                </li>
                <li><a data-page="about">ABOUT</a></li>
                <li><a data-page="contact">CONTACT</a></li>
                <li class="lang-switch">
                    <button id="lang-en" class="active">EN</button>
                    <button id="lang-hi">हिंदी</button>
                </li>
            </ul>
            <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
        </nav>
    </header>

    <main id="main-content" class="container" style="min-height:60vh; padding:2rem 0;"></main>

    <footer class="global-footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>H8 Media House</h4>
                <p><i class="fas fa-map-marker-alt"></i> Delhi NCR, India</p>
                <p><i class="fas fa-phone-alt"></i> +91 7870455069</p>
                <p><i class="fas fa-envelope"></i> gyanendra0710@gmail.com</p>
                <div class="social-links" style="margin-top:1rem;">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-x-twitter"></i></a>
                    <a href="#"><i class="fab fa-soundcloud"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
            <div class="footer-col">
                <h4>Quick Contact</h4>
                <form class="footer-form" action="https://formsubmit.co/gyanendra0710@gmail.com" method="POST">
                    <input type="text" name="name" placeholder="Your name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" placeholder="Your message" rows="2" required></textarea>
                    <button type="submit" class="btn-small">Send Message</button>
                </form>
            </div>
            <div class="footer-col">
                <h4>Explore</h4>
                <p><a href="#" data-page="home" style="color:#aaa; text-decoration:none;">Home</a></p>
                <p><a href="#" data-page="services" style="color:#aaa; text-decoration:none;">Services</a></p>
                <p><a href="#" data-page="artist-list" style="color:#aaa; text-decoration:none;">Artists</a></p>
                <p><a href="#" data-page="about" style="color:#aaa; text-decoration:none;">About</a></p>
                <p><a href="#" data-page="contact" style="color:#aaa; text-decoration:none;">Contact</a></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 H8 Media House — artists · management · bookings. All rights reserved.</p>
        </div>
    </footer>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
